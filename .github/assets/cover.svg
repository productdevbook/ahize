<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <!-- Warm cream paper background with subtle noise -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.82  0 0 0 0 0.74  0 0 0 0 0.62  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feComposite in2="off" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradient for main wordmark -->
    <linearGradient id="wordmarkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b3a2f"/>
      <stop offset="100%" stop-color="#2d5a48"/>
    </linearGradient>

    <!-- Accent coral → tangerine -->
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#ff5a36"/>
    </linearGradient>

    <!-- Mint -->
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#83e0bd"/>
      <stop offset="100%" stop-color="#42b883"/>
    </linearGradient>

    <!-- Periwinkle -->
    <linearGradient id="periwinkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5a8ff"/>
      <stop offset="100%" stop-color="#7073e8"/>
    </linearGradient>

    <!-- Butter -->
    <linearGradient id="butter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe38a"/>
      <stop offset="100%" stop-color="#ffb84d"/>
    </linearGradient>
  </defs>

  <!-- ════════════════════════════════════════ -->
  <!-- CREAM PAPER BACKGROUND                    -->
  <!-- ════════════════════════════════════════ -->
  <rect width="1200" height="628" fill="#fbf6ed"/>
  <rect width="1200" height="628" filter="url(#paper)"/>

  <!-- Subtle diagonal stripes for texture (top right and bottom left) -->
  <g opacity="0.06" fill="#1b3a2f">
    <rect x="-100" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="-40" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="20" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="80" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="140" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="200" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- CHAT BUBBLE CLUSTER — LEFT               -->
  <!-- ════════════════════════════════════════ -->

  <!-- Visitor bubble 1 (coral) -->
  <g transform="translate(80, 140) rotate(-4)" filter="url(#softShadow)">
    <path d="M0,22 Q0,0 22,0 L208,0 Q230,0 230,22 L230,92 Q230,114 208,114 L58,114 L30,140 L42,114 L22,114 Q0,114 0,92 Z"
          fill="url(#coral)"/>
    <rect x="26" y="36" width="140" height="8" rx="4" fill="#fff" opacity="0.9"/>
    <rect x="26" y="56" width="180" height="8" rx="4" fill="#fff" opacity="0.7"/>
    <rect x="26" y="76" width="90" height="8" rx="4" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Visitor bubble 2 (butter) - smaller, under -->
  <g transform="translate(48, 300) rotate(6)" filter="url(#softShadow)">
    <path d="M0,16 Q0,0 16,0 L150,0 Q166,0 166,16 L166,68 Q166,84 150,84 L40,84 L20,104 L28,84 L16,84 Q0,84 0,68 Z"
          fill="url(#butter)"/>
    <rect x="18" y="28" width="100" height="6" rx="3" fill="#5a3a00" opacity="0.55"/>
    <rect x="18" y="44" width="130" height="6" rx="3" fill="#5a3a00" opacity="0.4"/>
    <rect x="18" y="60" width="70" height="6" rx="3" fill="#5a3a00" opacity="0.3"/>
  </g>

  <!-- Operator bubble (mint) - bottom left -->
  <g transform="translate(110, 440) rotate(-3)" filter="url(#softShadow)">
    <path d="M0,20 Q0,0 20,0 L180,0 Q200,0 200,20 L200,80 Q200,100 180,100 L158,100 L172,124 L138,100 L20,100 Q0,100 0,80 Z"
          fill="url(#mint)"/>
    <!-- Three animated-looking typing dots -->
    <circle cx="54" cy="50" r="8" fill="#fff"/>
    <circle cx="90" cy="50" r="8" fill="#fff" opacity="0.75"/>
    <circle cx="126" cy="50" r="8" fill="#fff" opacity="0.5"/>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- HANDSET ICON — TOP RIGHT                 -->
  <!-- Clean geometric, mint on coral backdrop  -->
  <!-- ════════════════════════════════════════ -->
  <g transform="translate(920, 70)">
    <!-- Circle backdrop -->
    <circle cx="120" cy="120" r="115" fill="#ff8a65" opacity="0.18"/>
    <circle cx="120" cy="120" r="92" fill="#ff8a65" opacity="0.28"/>

    <!-- Handset shape -->
    <g transform="translate(40, 40) rotate(-35, 80, 80)" filter="url(#softShadow)">
      <!-- Ear piece -->
      <rect x="0" y="0" width="60" height="45" rx="22" fill="url(#mint)"/>
      <!-- Mouth piece -->
      <rect x="100" y="115" width="60" height="45" rx="22" fill="url(#mint)"/>
      <!-- Bar connecting them (curved) -->
      <path d="M30,22 Q10,80 60,142" stroke="url(#mint)" stroke-width="14" fill="none" stroke-linecap="round"/>
      <path d="M130,138 Q150,80 100,18" stroke="url(#mint)" stroke-width="14" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Signal arcs around the handset -->
    <g stroke="#1b3a2f" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M214,82 Q235,118 214,156"/>
      <path d="M234,62 Q270,118 234,176"/>
    </g>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- SUPPORT HEADSET — BOTTOM RIGHT           -->
  <!-- ════════════════════════════════════════ -->
  <g transform="translate(960, 420) rotate(6)" filter="url(#softShadow)">
    <!-- Headband arc -->
    <path d="M10,90 Q10,10 100,10 Q190,10 190,90" fill="none" stroke="url(#periwinkle)" stroke-width="8" stroke-linecap="round"/>
    <!-- Left ear cup -->
    <rect x="-6" y="82" width="38" height="56" rx="10" fill="url(#periwinkle)"/>
    <rect x="4" y="92" width="18" height="36" rx="5" fill="#1b3a2f" opacity="0.25"/>
    <!-- Right ear cup -->
    <rect x="168" y="82" width="38" height="56" rx="10" fill="url(#periwinkle)"/>
    <rect x="178" y="92" width="18" height="36" rx="5" fill="#1b3a2f" opacity="0.25"/>
    <!-- Mic arm -->
    <path d="M32,120 Q70,160 110,150" stroke="url(#periwinkle)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Mic capsule -->
    <ellipse cx="118" cy="150" rx="14" ry="9" fill="url(#coral)"/>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- DECORATIVE STARS/SPARKS                  -->
  <!-- ════════════════════════════════════════ -->
  <g fill="#1b3a2f" opacity="0.55">
    <g transform="translate(340, 110)">
      <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z"/>
    </g>
    <g transform="translate(890, 340)">
      <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"/>
    </g>
    <g transform="translate(410, 495)">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z"/>
    </g>
    <g transform="translate(820, 540)">
      <path d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z"/>
    </g>
  </g>

  <!-- Dotted trails connecting bubbles (conversation flow) -->
  <g fill="#1b3a2f" opacity="0.35">
    <circle cx="340" cy="240" r="3"/>
    <circle cx="370" cy="252" r="3"/>
    <circle cx="400" cy="268" r="3"/>
    <circle cx="432" cy="288" r="3"/>
    <circle cx="468" cy="312" r="3"/>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- CENTER CONTENT                           -->
  <!-- ════════════════════════════════════════ -->

  <!-- Wordmark "ahize" -->
  <text x="600" y="270" text-anchor="middle" fill="url(#wordmarkGrad)"
        font-family="'Cooper','Cooper Black','Georgia',serif"
        font-size="156" font-weight="900" letter-spacing="-4">ahize</text>

  <!-- Underline accent -->
  <path d="M470,300 Q600,316 730,300" stroke="url(#coral)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="600" y="354" text-anchor="middle" fill="#1b3a2f"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="19" font-weight="500" letter-spacing="1">
    The unified API for every live-chat widget.
  </text>

  <!-- Feature chips -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600">
    <!-- Chip 1 coral -->
    <g transform="translate(312, 388)">
      <rect x="0" y="0" width="140" height="34" rx="17" fill="url(#coral)"/>
      <text x="70" y="22" text-anchor="middle" fill="#fff">0 dependencies</text>
    </g>
    <!-- Chip 2 mint -->
    <g transform="translate(464, 388)">
      <rect x="0" y="0" width="130" height="34" rx="17" fill="url(#mint)"/>
      <text x="65" y="22" text-anchor="middle" fill="#143a2b">13 providers</text>
    </g>
    <!-- Chip 3 periwinkle -->
    <g transform="translate(606, 388)">
      <rect x="0" y="0" width="124" height="34" rx="17" fill="url(#periwinkle)"/>
      <text x="62" y="22" text-anchor="middle" fill="#fff">TypeScript</text>
    </g>
    <!-- Chip 4 butter -->
    <g transform="translate(742, 388)">
      <rect x="0" y="0" width="150" height="34" rx="17" fill="url(#butter)"/>
      <text x="75" y="22" text-anchor="middle" fill="#5a3a00">tree-shakeable</text>
    </g>
  </g>

  <!-- Provider list -->
  <text x="600" y="460" text-anchor="middle" fill="#1b3a2f" opacity="0.65"
        font-family="'JetBrains Mono','SF Mono',monospace" font-size="12" letter-spacing="1.4">
    Intercom · Crisp · Tawk · Zendesk · HubSpot · Chatwoot · LiveChat · Drift · Freshchat · Olark · Userlike · HelpScout
  </text>

  <!-- npm install chip -->
  <g transform="translate(492, 488)" filter="url(#softShadow)">
    <rect x="0" y="0" width="216" height="42" rx="21" fill="#1b3a2f"/>
    <text x="22" y="27" fill="#ff8a65" font-family="'JetBrains Mono','SF Mono',monospace" font-size="14" font-weight="700">$</text>
    <text x="40" y="27" fill="#fbf6ed" font-family="'JetBrains Mono','SF Mono',monospace" font-size="14" font-weight="500">npm i</text>
    <text x="96" y="27" fill="#83e0bd" font-family="'JetBrains Mono','SF Mono',monospace" font-size="14" font-weight="700">ahize</text>
  </g>

  <!-- GitHub link -->
  <text x="600" y="572" text-anchor="middle" fill="#1b3a2f" opacity="0.45"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="12" letter-spacing="1">
    github.com/productdevbook/ahize
  </text>
</svg>
