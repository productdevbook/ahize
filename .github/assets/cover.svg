<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.82  0 0 0 0 0.74  0 0 0 0 0.62  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feComposite in2="off" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="wordmarkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b3a2f"/>
      <stop offset="100%" stop-color="#2d5a48"/>
    </linearGradient>

    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#ff5a36"/>
    </linearGradient>

    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#83e0bd"/>
      <stop offset="100%" stop-color="#42b883"/>
    </linearGradient>

    <linearGradient id="periwinkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5a8ff"/>
      <stop offset="100%" stop-color="#7073e8"/>
    </linearGradient>

    <linearGradient id="butter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe38a"/>
      <stop offset="100%" stop-color="#ffb84d"/>
    </linearGradient>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="628" fill="#fbf6ed"/>
  <rect width="1200" height="628" filter="url(#paper)"/>

  <!-- Subtle diagonal stripes, very faint -->
  <g opacity="0.05" fill="#1b3a2f">
    <rect x="-100" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="-40" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="20" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="80" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
    <rect x="140" y="-100" width="2" height="900" transform="rotate(20 600 314)"/>
  </g>

  <!-- ════════════════════════════════════ -->
  <!-- LEFT COLUMN: two chat bubbles stacked -->
  <!-- ════════════════════════════════════ -->

  <!-- Visitor bubble — coral, top-left -->
  <g transform="translate(50, 140) rotate(-4)" filter="url(#softShadow)">
    <path d="M0,22 Q0,0 22,0 L218,0 Q240,0 240,22 L240,116 Q240,138 218,138 L70,138 L42,166 L54,138 L22,138 Q0,138 0,116 Z"
          fill="url(#coral)"/>
    <rect x="28" y="40" width="170" height="10" rx="5" fill="#fff" opacity="0.95"/>
    <rect x="28" y="66" width="200" height="10" rx="5" fill="#fff" opacity="0.75"/>
    <rect x="28" y="92" width="120" height="10" rx="5" fill="#fff" opacity="0.55"/>
  </g>

  <!-- Operator bubble — mint, bottom-left (typing dots) -->
  <g transform="translate(90, 400) rotate(-2)" filter="url(#softShadow)">
    <path d="M0,22 Q0,0 22,0 L218,0 Q240,0 240,22 L240,102 Q240,124 218,124 L186,124 L204,150 L162,124 L22,124 Q0,124 0,102 Z"
          fill="url(#mint)"/>
    <circle cx="70" cy="62" r="11" fill="#fff"/>
    <circle cx="110" cy="62" r="11" fill="#fff" opacity="0.75"/>
    <circle cx="150" cy="62" r="11" fill="#fff" opacity="0.5"/>
  </g>

  <!-- ════════════════════════════════════ -->
  <!-- RIGHT COLUMN: headset + handset       -->
  <!-- ════════════════════════════════════ -->

  <!-- Handset, top-right -->
  <g transform="translate(960, 110)">
    <circle cx="100" cy="100" r="108" fill="#ff8a65" opacity="0.18"/>
    <circle cx="100" cy="100" r="82" fill="#ff8a65" opacity="0.3"/>
    <g transform="translate(28, 28) rotate(-35, 72, 72)" filter="url(#softShadow)">
      <rect x="0" y="0" width="56" height="42" rx="21" fill="url(#mint)"/>
      <rect x="88" y="102" width="56" height="42" rx="21" fill="url(#mint)"/>
      <path d="M28,20 Q10,72 54,126" stroke="url(#mint)" stroke-width="13" fill="none" stroke-linecap="round"/>
      <path d="M116,122 Q134,72 90,18" stroke="url(#mint)" stroke-width="13" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Headset, bottom-right -->
  <g transform="translate(970, 410) rotate(6)" filter="url(#softShadow)">
    <path d="M10,96 Q10,10 106,10 Q202,10 202,96" fill="none" stroke="url(#periwinkle)" stroke-width="10" stroke-linecap="round"/>
    <rect x="-6" y="86" width="42" height="62" rx="12" fill="url(#periwinkle)"/>
    <rect x="6" y="98" width="20" height="38" rx="6" fill="#1b3a2f" opacity="0.25"/>
    <rect x="176" y="86" width="42" height="62" rx="12" fill="url(#periwinkle)"/>
    <rect x="188" y="98" width="20" height="38" rx="6" fill="#1b3a2f" opacity="0.25"/>
    <path d="M36,128 Q78,172 120,162" stroke="url(#periwinkle)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <ellipse cx="128" cy="162" rx="15" ry="10" fill="url(#coral)"/>
  </g>

  <!-- ════════════════════════════════════ -->
  <!-- CENTER CONTENT — BIG & LEGIBLE        -->
  <!-- ════════════════════════════════════ -->

  <!-- Wordmark -->
  <text x="600" y="260" text-anchor="middle" fill="url(#wordmarkGrad)"
        font-family="'Cooper','Cooper Black','Georgia',serif"
        font-size="200" font-weight="900" letter-spacing="-6">ahize</text>

  <!-- Underline -->
  <path d="M420,290 Q600,312 780,290" stroke="url(#coral)" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Tagline — bigger, bolder, tighter copy -->
  <text x="600" y="354" text-anchor="middle" fill="#1b3a2f"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="700" letter-spacing="-0.3">
    One API for every live-chat widget.
  </text>

  <!-- Feature chips — text precisely centered via dominant-baseline -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700"
     text-anchor="middle" dominant-baseline="central">
    <g transform="translate(252, 402)">
      <rect x="0" y="0" width="176" height="48" rx="24" fill="url(#coral)"/>
      <text x="88" y="25" fill="#fff">0 dependencies</text>
    </g>
    <g transform="translate(442, 402)">
      <rect x="0" y="0" width="160" height="48" rx="24" fill="url(#mint)"/>
      <text x="80" y="25" fill="#143a2b">SSR-safe</text>
    </g>
    <g transform="translate(616, 402)">
      <rect x="0" y="0" width="148" height="48" rx="24" fill="url(#periwinkle)"/>
      <text x="74" y="25" fill="#fff">TypeScript</text>
    </g>
    <g transform="translate(778, 402)">
      <rect x="0" y="0" width="178" height="48" rx="24" fill="url(#butter)"/>
      <text x="89" y="25" fill="#5a3a00">tree-shakeable</text>
    </g>
  </g>

  <!-- npm install chip — single text block, centered -->
  <g transform="translate(458, 488)" filter="url(#softShadow)">
    <rect x="0" y="0" width="284" height="56" rx="28" fill="#1b3a2f"/>
    <text x="142" y="29" text-anchor="middle" dominant-baseline="central"
          font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="700">
      <tspan fill="#ff8a65" font-weight="800">$</tspan><tspan fill="#fbf6ed"> npm i </tspan><tspan fill="#83e0bd" font-weight="800">ahize</tspan>
    </text>
  </g>

  <!-- GitHub attribution — still readable -->
  <text x="600" y="596" text-anchor="middle" fill="#1b3a2f" opacity="0.55"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="600" letter-spacing="0.3">
    github.com/productdevbook/ahize
  </text>
</svg>
