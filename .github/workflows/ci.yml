name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 👀 Lint
        run: pnpm lint
      - name: 🔍 Typecheck
        run: pnpm typecheck
      - name: 🧪 Test
        run: pnpm test
      - name: 🚀 Build
        run: pnpm build
      - name: 📐 Bundle size budget
        run: pnpm bundle-budget
      - name: 🔍 Are The Types Wrong (ATTW)
        if: matrix.node == 22
        run: pnpm attw
