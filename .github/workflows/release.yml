name: Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 👀 Lint
        run: pnpm lint

      - name: 🔍 Typecheck
        run: pnpm typecheck

      - name: 🧪 Test
        run: pnpm test

      - name: 🚀 Build
        run: pnpm build

      - name: 📐 Bundle size budget
        run: pnpm bundle-budget

      - name: 🔍 Are The Types Wrong (ATTW)
        run: pnpm attw

      - name: 📦 Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🦕 Publish to JSR
        run: pnpm dlx jsr publish --allow-slow-types
        continue-on-error: true

      - name: 📝 Generate changelog
        run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 💖 Append sponsor footer to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          current=$(gh release view "$TAG" --json body -q .body)
          footer=$'\n\n---\n\n### 💖 Support ahize\n\nIf ahize saves you engineering time, consider [sponsoring on GitHub](https://github.com/sponsors/productdevbook) — it keeps the next provider + framework adapter shipping.\n\n<a href="https://github.com/sponsors/productdevbook"><img src="https://cdn.jsdelivr.net/gh/productdevbook/static/sponsors.svg" alt="Sponsors" /></a>'
          printf '%s%s' "$current" "$footer" | gh release edit "$TAG" --notes-file -

      - name: 📊 Summary
        run: |
          echo "## Release Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
